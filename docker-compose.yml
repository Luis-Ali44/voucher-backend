services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: voucher_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: voucher_user
      POSTGRES_PASSWORD: voucher_pass
      POSTGRES_DB: voucher_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voucher_user -d voucher_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voucher_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://voucher_user:voucher_pass@db:5432/voucher_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
